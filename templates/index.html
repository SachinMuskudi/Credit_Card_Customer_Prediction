<!DOCTYPE html>
<html>
<head>
<title>Customer Credit Risk Prediction</title>

<style>

body{
    font-family: 'Segoe UI', Arial, sans-serif;
    margin:0;
    padding:0;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* main card */
form{
    background: rgba(255,255,255,0.92);
    padding:35px;
    border-radius:20px;
    width:450px;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

/* title */
h1{
    text-align:center;
    color:#333;
    margin-bottom:25px;
}

/* labels */
label{
    display:block;
    margin-top:14px;
    font-weight:600;
    color:#444;
}

/* input boxes */
input{
    width:100%;
    padding:10px 12px;
    margin-top:6px;
    border-radius:10px;
    border:1px solid #dcdcdc;
    background:#f9fbff;
    font-size:14px;
    transition:all 0.3s ease;
}

/* focus effect */
input:focus{
    border-color:#4facfe;
    background:white;
    outline:none;
    box-shadow:0 0 8px rgba(79,172,254,0.5);
}

/* button */
button{
    margin-top:20px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#4facfe,#00c6ff);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

/* button hover */
button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* prediction result */
.result{
    margin-top:20px;
    text-align:center;
    padding:12px;
    font-size:18px;
    font-weight:bold;
    border-radius:10px;
    background:#eafaf1;
    color:#27ae60;
}

</style>

</head>

<body>

<div>

<h1>Customer Credit Risk Prediction</h1>

<form method="post">

<label>RevolvingUtilizationOfUnsecuredLines_trim</label>
<input type="number" step="any" name="RevolvingUtilizationOfUnsecuredLines_trim" required>

<label>Age</label>
<input type="number" step="any" name="Age" required>

<label>NumberOfOpenCreditLinesAndLoans</label>
<input type="number" step="any" name="NumberOfOpenCreditLinesAndLoans" required>

<label>NumberRealEstateLoansOrLines</label>
<input type="number" step="any" name="NumberRealEstateLoansOrLines" required>

<label>MonthlyIncome_replaced</label>
<input type="number" step="any" name="MonthlyIncome_replaced" required>

<label>NumberOfDependents_replaced_trim</label>
<input type="number" step="any" name="NumberOfDependents_replaced_trim" required>

<label>Gender_Male (1=Male, 0=Female)</label>
<input type="number" name="Gender_Male" required>

<label>Region_East</label>
<input type="number" name="Region_East" required>

<label>Region_North</label>
<input type="number" name="Region_North" required>

<label>Region_South</label>
<input type="number" name="Region_South" required>

<label>Region_West</label>
<input type="number" name="Region_West" required>

<label>Rented_OwnHouse_con</label>
<input type="number" step="any" name="Rented_OwnHouse_con" required>

<label>Occupation_con</label>
<input type="number" step="any" name="Occupation_con" required>

<label>Education_con</label>
<input type="number" step="any" name="Education_con" required>

<button type="submit">Predict</button>

</form>

{% if prediction %}
<div class="result">
Prediction: {{ prediction }}
</div>
{% endif %}

</div>

</body>
</html>
